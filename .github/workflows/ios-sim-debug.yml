name: iOS Simulator Debug (VBS-499)

# Workflow debug: build app rồi CHẠY THẬT trên iOS Simulator ngay trên runner.
# Webview gửi trạng thái DOM về runner qua beacon (screenshot không đáng tin).
# KHÔNG ký, KHÔNG upload TestFlight. Chỉ chạy thủ công. Xoá sau khi fix xong VBS-499.

on:
  workflow_dispatch:
    inputs:
      build_mode:
        description: 'ionic-cordova (đúng, có inject cordova.js) hoặc plain (như testflight.yml hiện tại)'
        required: true
        default: 'ionic-cordova'
        type: choice
        options: [ionic-cordova, plain]

env:
  NODE_VERSION: '24'
  BUNDLE_ID: 'vn.vbs.moodleapp'

jobs:
  debug-sim:
    name: Run app on iOS Simulator
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install CLI tools
        run: npm install -g @ionic/cli cordova

      - name: Install dependencies
        run: npm ci

      - name: Write moodle.config.prod.json
        run: |
          printf '{"sites":[{"url":"%s","name":"VBS LMS"}],"default_lang":"vi"}' \
            '${{ secrets.MOODLE_SITE_URL }}' > moodle.config.prod.json

      - name: Update Bundle ID + ATS (ATS chỉ để beacon debug)
        run: |
          sed -i '' 's/id="com\.moodle\.moodlemobile"/id="${{ env.BUNDLE_ID }}"/' config.xml
          python3 - << 'PYEOF'
          p='config.xml'; s=open(p,encoding='utf-8').read()
          ats='    <platform name="ios">\n        <edit-config file="*-Info.plist" mode="merge" target="NSAppTransportSecurity">\n            <dict><key>NSAllowsArbitraryLoads</key><true/></dict>\n        </edit-config>'
          s=s.replace('    <platform name="ios">', ats, 1)
          assert 'NSAllowsArbitraryLoads' in s, 'ATS chèn thất bại'
          open(p,'w',encoding='utf-8').write(s)
          print('ATS exception added (debug only)')
          PYEOF

      - name: Add iOS platform
        run: ionic cordova platform add ios --no-interactive

      # ─── Đây là điểm mấu chốt của VBS-499 ────────────────────────────────
      # plain          = ionic build  -> target app:build (custom-webpack:browser)
      #                  KHÔNG inject cordova.js  -> deviceready không bao giờ bắn
      # ionic-cordova  = ionic cordova build -> target ionic-cordova-build
      #                  (@ionic/cordova-builders:cordova-build) -> CÓ inject cordova.js
      - name: Build iOS cho simulator (mode = ${{ inputs.build_mode }})
        env:
          NODE_ENV: production
          NODE_OPTIONS: --max-old-space-size=8192
        run: |
          if [ "${{ inputs.build_mode }}" = "plain" ]; then
            echo ">>> MODE PLAIN (tái hiện bug: giống testflight.yml hiện tại)"
            ionic build --prod
            cordova build ios --emulator -- --buildFlag='CODE_SIGNING_ALLOWED=NO' --buildFlag='CODE_SIGNING_REQUIRED=NO'
          else
            echo ">>> MODE IONIC-CORDOVA (fix đề xuất)"
            ionic cordova build ios --prod --emulator --no-interactive -- --buildFlag='CODE_SIGNING_ALLOWED=NO' --buildFlag='CODE_SIGNING_REQUIRED=NO'
          fi

      - name: Kiểm chứng cordova.js + env.json
        run: |
          echo "=== config keys ==="
          node -e "
          const c = require('./src/assets/env.json').config;
          console.log('config key count:', Object.keys(c).length, '| sites:', JSON.stringify(c.sites));
          if (Object.keys(c).length < 30) { console.error('CONFIG THIẾU KEY!'); process.exit(1); }
          "
          echo "=== script tags trong www/index.html (output của build) ==="
          grep -oE 'src="[^"]+\.js"' www/index.html || true
          echo ""
          echo "=== CHẠY ĐÚNG GUARD của testflight.yml để kiểm chứng regex ==="
          if grep -qE 'src="cordova[^"]*\.js"' www/index.html; then
            echo "GUARD => PASS (index.html có nhúng bundle cordova)"
          else
            echo "GUARD => FAIL (index.html KHÔNG nhúng cordova)"
          fi
          echo ""
          echo "=== bundle cordova Angular sinh ra trong www ==="
          ls -la www/cordova*.js 2>/dev/null || echo "(không có)"

          APP=$(find platforms/ios/build -name "*.app" -type d | head -1)
          echo "APP = $APP"
          echo "APP_PATH=$APP" >> $GITHUB_ENV

      - name: Inject beacon vào .app bundle
        run: |
          python3 - << 'PYEOF'
          import os
          path = os.environ['APP_PATH'] + '/www/index.html'
          html = open(path, encoding='utf-8').read()
          inject = """<script>
          (function(){
            var lines=[];var stage='head';var n=0;
            function diag(){
              var a=document.querySelector('ion-app');
              return 'stage='+stage+';err='+lines.length
                +';ionApp='+(a?('Y:'+a.children.length):'N')
                +';bodyLen='+(document.body?document.body.innerHTML.length:-1)
                +';cordova='+(window.cordova?1:0)
                +';sqlite='+(window.sqlitePlugin?1:0)
                +';device='+(window.device?1:0)
                +(lines.length?';E='+lines.slice(0,2).join(' || ').slice(0,500):'');
            }
            function beacon(){try{new Image().src='http://127.0.0.1:8765/r?n='+(n++)+'&d='+encodeURIComponent(diag());}catch(e){}}
            function add(t){lines.push(t);beacon();}
            window.addEventListener('error',function(e){
              var t=e.target;
              if(t&&t!==window&&(t.src||t.href)){add('RESFAIL '+(t.src||t.href));}
              else{add('ERR '+(e.message||'')+' @ '+((e.error&&e.error.stack)||'').slice(0,200));}
            },true);
            window.addEventListener('unhandledrejection',function(e){var r=e.reason;add('REJ '+((r&&(r.stack||r.message))||String(r)).slice(0,200));});
            var ce=console.error;
            console.error=function(){add('CONSOLE '+Array.prototype.map.call(arguments,function(a){return(a&&(a.stack||a.message))||String(a);}).join(' ').slice(0,300));ce.apply(console,arguments);};
            document.addEventListener('DOMContentLoaded',function(){stage='domready';beacon();});
            window.addEventListener('load',function(){stage='load';beacon();});
            document.addEventListener('deviceready',function(){stage='DEVICEREADY';beacon();});
            beacon();
            setInterval(beacon,2000);
          })();
          </script>"""
          html = html.replace('<head>', '<head>' + inject, 1)
          open(path, 'w', encoding='utf-8').write(html)
          print('beacon injected into', path)
          PYEOF

      - name: Boot simulator
        id: sim
        run: |
          UDID=$(xcrun simctl list devices available -j | python3 -c "
          import json,sys
          for rt, devs in json.load(sys.stdin)['devices'].items():
              if 'iOS' not in rt: continue
              for d in devs:
                  if d.get('isAvailable') and 'iPhone' in d['name']:
                      print(d['udid']); raise SystemExit
          ")
          xcrun simctl boot "$UDID" || true
          xcrun simctl bootstatus "$UDID" -b || true
          # BẮT BUỘC: có window/Metal context, nếu không WebKit GPU process crash -> trắng giả
          open -a Simulator --args -CurrentDeviceUDID "$UDID" || true
          sleep 25
          echo "udid=$UDID" >> $GITHUB_OUTPUT

      - name: Install & launch
        run: |
          UDID='${{ steps.sim.outputs.udid }}'
          xcrun simctl install "$UDID" "$APP_PATH"

          python3 -m http.server 8765 --bind 127.0.0.1 > /dev/null 2> /tmp/beacon.log &
          echo $! > /tmp/beaconpid
          sleep 2

          xcrun simctl spawn "$UDID" log stream --level debug \
            --predicate 'processImagePath CONTAINS "App" OR senderImagePath CONTAINS "WebKit"' \
            > /tmp/simlog.txt 2>&1 &
          echo $! > /tmp/logpid

          xcrun simctl launch "$UDID" '${{ env.BUNDLE_ID }}' || true
          sleep 30
          xcrun simctl io "$UDID" screenshot /tmp/screen.png || true
          sleep 30
          xcrun simctl io "$UDID" screenshot /tmp/screen2.png || true
          kill $(cat /tmp/logpid) 2>/dev/null || true
          kill $(cat /tmp/beaconpid) 2>/dev/null || true

      - name: BEACON — trạng thái thật của webview
        if: always()
        run: |
          if grep -q "gpuProcessDidExit\|GPU Process has crashed" /tmp/simlog.txt 2>/dev/null; then
            echo "!! GPU process crash -> màn trắng do CI, không kết luận về app."
          else
            echo "OK: GPU không crash."
          fi
          echo "=================== BEACON ==================="
          if [ ! -s /tmp/beacon.log ]; then
            echo "!! KHÔNG NHẬN ĐƯỢC BEACON NÀO -> JS không chạy hoặc network bị chặn."
          else
            python3 - << 'PYEOF'
          import re, urllib.parse
          seen = []
          for line in open('/tmp/beacon.log', encoding='utf-8', errors='replace'):
              m = re.search(r'GET /r\?n=(\d+)&d=(\S+) HTTP', line)
              if not m: continue
              d = urllib.parse.unquote(m.group(2))
              if d not in [s for _, s in seen]:
                  seen.append((m.group(1), d))
          print('tổng số beacon khác nhau:', len(seen))
          for n, d in seen[:20]:
              print(f'  [{n}] {d}')
          print()
          last = seen[-1][1] if seen else ''
          print('=== KẾT LUẬN ===')
          print('deviceready bắn?  ', 'CÓ' if any('DEVICEREADY' in d for _, d in seen) else 'KHÔNG')
          print('cordova có mặt?   ', 'CÓ' if ';cordova=1' in last else 'KHÔNG')
          print('ion-app render?   ', 'CÓ' if ';ionApp=Y' in last else 'KHÔNG')
          PYEOF
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sim-debug-${{ inputs.build_mode }}
          path: |
            /tmp/screen.png
            /tmp/screen2.png
            /tmp/simlog.txt
            /tmp/beacon.log
          retention-days: 3
