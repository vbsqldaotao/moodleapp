name: iOS TestFlight

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:

env:
  NODE_VERSION: '24'
  BUNDLE_ID: 'vn.vbs.moodleapp'
  TEAM_ID: '3AS56742DJ'
  APP_NAME: 'Moodle'   # phải khớp với <name> trong config.xml

jobs:
  # ── Job 1: Build web (chạy trên mọi push lên main và tag) ──────────────────
  build-web:
    name: Build web
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Write moodle.config.prod.json
        run: |
          # Chỉ ghi các key cần override — KHÔNG ghi đè moodle.config.json gốc.
          # gulp/task-build-env.js tự merge moodle.config.prod.json lên trên config gốc khi NODE_ENV=production.
          # Ghi đè file gốc sẽ xoá toàn bộ 36 key bắt buộc (languages, zoomlevels, app_id...) → app trắng màn hình (VBS-499).
          printf '{"sites":[{"url":"%s","name":"VBS LMS"}],"default_lang":"vi"}' \
            '${{ secrets.MOODLE_SITE_URL }}' > moodle.config.prod.json
          cat moodle.config.prod.json

      - name: Build production web
        run: npm run build:prod

      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: www/
          retention-days: 1

  # ── Job 2: Build iOS + upload TestFlight (chỉ chạy khi có tag v*.*.*) ───────
  build-ios:
    name: Build iOS & upload TestFlight
    runs-on: macos-15
    needs: build-web
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26 (iOS 26 SDK)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install CLI tools
        run: npm install -g @ionic/cli cordova

      - name: Install dependencies
        run: npm ci

      - name: Write moodle.config.prod.json
        run: |
          # Chỉ ghi các key cần override — KHÔNG ghi đè moodle.config.json gốc.
          # gulp/task-build-env.js tự merge moodle.config.prod.json lên trên config gốc khi NODE_ENV=production.
          # Ghi đè file gốc sẽ xoá toàn bộ 36 key bắt buộc (languages, zoomlevels, app_id...) → app trắng màn hình (VBS-499).
          printf '{"sites":[{"url":"%s","name":"VBS LMS"}],"default_lang":"vi"}' \
            '${{ secrets.MOODLE_SITE_URL }}' > moodle.config.prod.json
          cat moodle.config.prod.json

      - name: Update Bundle ID in config.xml
        run: |
          sed -i '' \
            's/id="com\.moodle\.moodlemobile"/id="${{ env.BUNDLE_ID }}"/' \
            config.xml
          # Cập nhật CFBundleVersion trong widget attribute (5.3.0.0 → run_number)
          sed -i '' \
            "s/ios-CFBundleVersion=\"[^\"]*\"/ios-CFBundleVersion=\"${{ github.run_number }}\"/" \
            config.xml
          grep 'ios-CFBundleVersion\|widget.*id=' config.xml | head -2

      - name: Setup iOS signing
        env:
          IOS_DISTRIBUTION_CERT_P12: ${{ secrets.IOS_DISTRIBUTION_CERT_P12 }}
          IOS_DISTRIBUTION_CERT_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERT_PASSWORD }}
          IOS_PROVISIONING_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE }}
        run: |
          # Tạo keychain tạm
          KEYCHAIN_PASS=$(openssl rand -hex 16)
          security create-keychain -p "$KEYCHAIN_PASS" build.keychain
          security list-keychains -d user -s build.keychain $(security list-keychains -d user | tr -d '"')
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASS" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

          # Import certificate
          echo "$IOS_DISTRIBUTION_CERT_P12" | base64 -d > /tmp/dist.p12
          security import /tmp/dist.p12 -k build.keychain \
            -P "$IOS_DISTRIBUTION_CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/xcodebuild
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASS" build.keychain

          # Install provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          PROFILE_PATH="$HOME/Library/MobileDevice/Provisioning Profiles/vbs_moodleapp.mobileprovision"
          echo "$IOS_PROVISIONING_PROFILE" | base64 -d > "$PROFILE_PATH"

          # Extract UUID từ profile (dùng temp file vì PlistBuddy không đọc stdin qua pipe)
          security cms -D -i "$PROFILE_PATH" > /tmp/profile.plist
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print UUID' /tmp/profile.plist)
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c 'Print Name' /tmp/profile.plist)
          echo "Profile UUID: $PROFILE_UUID"
          echo "Profile Name: $PROFILE_NAME"
          echo "PROFILE_UUID=$PROFILE_UUID" >> $GITHUB_ENV

      - name: Add iOS platform
        run: ionic cordova platform add ios --no-interactive

      - name: Write build.json for signing
        run: |
          cat > build.json << EOF
          {
            "ios": {
              "release": {
                "codeSignIdentity": "iPhone Distribution",
                "developmentTeam": "${{ env.TEAM_ID }}",
                "packageType": "app-store",
                "provisioningProfile": "${PROFILE_UUID}",
                "automaticProvisioning": false
              }
            }
          }
          EOF
          echo "=== build.json written ==="
          cat build.json

      # PHẢI dùng "ionic cordova build", KHÔNG dùng "ionic build" + "cordova compile" (VBS-499).
      # angular.json có 2 target:
      #   build               = @angular-builders/custom-webpack:browser  -> KHÔNG inject cordova.js
      #   ionic-cordova-build = @ionic/cordova-builders:cordova-build     -> CÓ inject cordova.js
      # "npm run build:prod" (= ionic build --prod) dùng target "build", mà src/index.html
      # không tự khai báo cordova.js -> app chạy như web thuần, deviceready KHÔNG BAO GIỜ bắn
      # -> plugin không tồn tại -> initialize-databases treo -> Angular không bootstrap -> MÀN TRẮNG.
      # Đã kiểm chứng trên iOS Simulator: plain -> deviceready KHÔNG, ion-app KHÔNG (trắng);
      # ionic cordova build -> deviceready CÓ, ion-app CÓ (ra màn Log in).
      - name: Build iOS release (ionic cordova build - có inject cordova.js)
        env:
          NODE_ENV: production
          NODE_OPTIONS: --max-old-space-size=8192
        run: |
          ionic cordova build ios --prod --release --device --no-interactive -- --buildConfig=build.json

      - name: Kiểm chứng cordova.js được NHÚNG VÀO index.html (chặn regression VBS-499)
        run: |
          APP=$(find platforms/ios/build -name "*.app" -type d | head -1)
          echo "APP = $APP"
          # KHÔNG kiểm tra sự tồn tại của file www/cordova.js: cordova prepare luôn copy
          # platform_www nên file đó CÓ ở cả bản hỏng lẫn bản đúng -> không phân biệt được.
          # Thứ thật sự quyết định là index.html có <script src="cordova.<hash>.js"> hay không.
          # (production dùng outputHashing: all nên tên bundle có hash.)
          echo "--- script tags trong index.html ---"
          grep -oE 'src="[^"]+\.js"' "$APP/www/index.html" || true
          if ! grep -qE '<script[^>]+src="cordova[^"]*\.js"' "$APP/www/index.html"; then
            echo "!! index.html KHÔNG nhúng cordova.js -> deviceready sẽ không bắn -> app trắng màn hình."
            echo "!! Nguyên nhân thường gặp: dùng 'ionic build' thay vì 'ionic cordova build'."
            exit 1
          fi
          echo "OK: index.html đã nhúng cordova.js."

      - name: Find IPA
        run: |
          echo "=== IPA search ==="
          find platforms/ios/build -name "*.ipa" 2>/dev/null
          find "$RUNNER_TEMP" -name "*.ipa" 2>/dev/null
          # Lưu đường dẫn IPA vào env
          IPA=$(find platforms/ios/build -name "*.ipa" 2>/dev/null | head -1)
          if [ -z "$IPA" ]; then
            IPA=$(find "$RUNNER_TEMP" -name "*.ipa" 2>/dev/null | head -1)
          fi
          echo "IPA_FILE=$IPA" >> $GITHUB_ENV
          echo "Found IPA: $IPA"

      - name: Upload to TestFlight
        env:
          ASC_API_KEY: ${{ secrets.ASC_API_KEY }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_API_KEY" | base64 -d \
            > ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8

          echo "Uploading: $IPA_FILE"
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_FILE" \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID" \
            --verbose

      - name: Cleanup secrets
        if: always()
        run: |
          security delete-keychain build.keychain || true
          rm -f /tmp/dist.p12 \
                ~/.appstoreconnect/private_keys/AuthKey_*.p8
