name: iOS TestFlight

on:
  push:
    branches: [main]
    tags: ['v*.*.*']

env:
  NODE_VERSION: '24'
  BUNDLE_ID: 'vn.vbs.moodleapp'
  TEAM_ID: '3AS56742DJ'
  APP_NAME: 'Moodle'   # phải khớp với <name> trong config.xml

jobs:
  # ── Job 1: Build web (chạy trên mọi push lên main và tag) ──────────────────
  build-web:
    name: Build web
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Write moodle.config.json
        run: |
          cat > moodle.config.json << 'EOF'
          {
            "default_lang": "vi",
            "defaultsites": [
              {
                "url": "${{ secrets.MOODLE_SITE_URL }}",
                "name": "VBS LMS"
              }
            ],
            "forcedefault": false
          }
          EOF

      - name: Build production web
        run: npm run build:prod

      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: www/
          retention-days: 1

  # ── Job 2: Build iOS + upload TestFlight (chỉ chạy khi có tag v*.*.*) ───────
  build-ios:
    name: Build iOS & upload TestFlight
    runs-on: macos-14
    needs: build-web
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install CLI tools
        run: npm install -g @ionic/cli cordova

      - name: Install dependencies
        run: npm ci

      - name: Write moodle.config.json
        run: |
          cat > moodle.config.json << 'EOF'
          {
            "default_lang": "vi",
            "defaultsites": [
              {
                "url": "${{ secrets.MOODLE_SITE_URL }}",
                "name": "VBS LMS"
              }
            ],
            "forcedefault": false
          }
          EOF

      - name: Update Bundle ID in config.xml
        run: |
          sed -i '' \
            's/id="com\.moodle\.moodlemobile"/id="${{ env.BUNDLE_ID }}"/' \
            config.xml
          grep 'widget.*id=' config.xml | head -1

      - name: Setup iOS signing
        env:
          IOS_DISTRIBUTION_CERT_P12: ${{ secrets.IOS_DISTRIBUTION_CERT_P12 }}
          IOS_DISTRIBUTION_CERT_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERT_PASSWORD }}
          IOS_PROVISIONING_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE }}
        run: |
          # Tạo keychain tạm
          KEYCHAIN_PASS=$(openssl rand -hex 16)
          security create-keychain -p "$KEYCHAIN_PASS" build.keychain
          security list-keychains -d user -s build.keychain $(security list-keychains -d user | tr -d '"')
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASS" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

          # Import certificate
          echo "$IOS_DISTRIBUTION_CERT_P12" | base64 -d > /tmp/dist.p12
          security import /tmp/dist.p12 -k build.keychain \
            -P "$IOS_DISTRIBUTION_CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/xcodebuild
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASS" build.keychain

          # Install provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          PROFILE_PATH="$HOME/Library/MobileDevice/Provisioning Profiles/vbs_moodleapp.mobileprovision"
          echo "$IOS_PROVISIONING_PROFILE" | base64 -d > "$PROFILE_PATH"

          # Extract UUID từ profile (dùng temp file vì PlistBuddy không đọc stdin qua pipe)
          security cms -D -i "$PROFILE_PATH" > /tmp/profile.plist
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print UUID' /tmp/profile.plist)
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c 'Print Name' /tmp/profile.plist)
          echo "Profile UUID: $PROFILE_UUID"
          echo "Profile Name: $PROFILE_NAME"
          echo "PROFILE_UUID=$PROFILE_UUID" >> $GITHUB_ENV

      - name: Build production web
        run: npm run build:prod

      - name: Add iOS platform
        run: ionic cordova platform add ios

      - name: Cordova prepare iOS
        run: ionic cordova prepare ios --prod

      - name: Debug iOS platform structure
        run: |
          echo "=== platforms/ios contents ==="
          ls -la platforms/ios/ || echo "No platforms/ios"
          echo "=== xcworkspace files ==="
          find platforms/ios -name "*.xcworkspace" -maxdepth 2 2>/dev/null || echo "none"
          echo "=== xcodeproj files ==="
          find platforms/ios -name "*.xcodeproj" -maxdepth 2 2>/dev/null || echo "none"

      - name: Archive with xcodebuild
        run: |
          set -o pipefail

          # Tìm workspace hoặc project (maxdepth 1 để tránh lấy workspace bên trong xcodeproj)
          WORKSPACE=$(find platforms/ios -maxdepth 1 -name "*.xcworkspace" | head -1)
          PROJECT=$(find platforms/ios -maxdepth 1 -name "*.xcodeproj" | head -1)

          if [ -n "$WORKSPACE" ]; then
            SCHEME=$(basename "$WORKSPACE" .xcworkspace)
            echo "Using workspace: $WORKSPACE (scheme: $SCHEME)"
            xcodebuild archive \
              -workspace "$WORKSPACE" \
              -scheme "$SCHEME" \
              -configuration Release \
              -archivePath "$RUNNER_TEMP/moodleapp.xcarchive" \
              DEVELOPMENT_TEAM="${{ env.TEAM_ID }}" \
              CODE_SIGN_STYLE=Manual \
              CODE_SIGN_IDENTITY="iPhone Distribution" \
              PROVISIONING_PROFILE="$PROFILE_UUID" \
              PRODUCT_BUNDLE_IDENTIFIER="${{ env.BUNDLE_ID }}"
          elif [ -n "$PROJECT" ]; then
            SCHEME=$(basename "$PROJECT" .xcodeproj)
            echo "Using project: $PROJECT (scheme: $SCHEME)"
            xcodebuild archive \
              -project "$PROJECT" \
              -scheme "$SCHEME" \
              -configuration Release \
              -archivePath "$RUNNER_TEMP/moodleapp.xcarchive" \
              DEVELOPMENT_TEAM="${{ env.TEAM_ID }}" \
              CODE_SIGN_STYLE=Manual \
              CODE_SIGN_IDENTITY="iPhone Distribution" \
              PROVISIONING_PROFILE="$PROFILE_UUID" \
              PRODUCT_BUNDLE_IDENTIFIER="${{ env.BUNDLE_ID }}"
          else
            echo "ERROR: No Xcode workspace or project found"
            exit 1
          fi

          echo "=== Archive created ==="
          ls -la "$RUNNER_TEMP/"

      - name: Export IPA
        run: |
          set -o pipefail

          cat > /tmp/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>${{ env.TEAM_ID }}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${{ env.BUNDLE_ID }}</key>
              <string>${PROFILE_UUID}</string>
            </dict>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/moodleapp.xcarchive" \
            -exportPath "$RUNNER_TEMP/ipa" \
            -exportOptionsPlist /tmp/ExportOptions.plist

          echo "=== IPA files ==="
          find "$RUNNER_TEMP/ipa" -name "*.ipa" 2>/dev/null

      - name: Upload to TestFlight
        env:
          ASC_API_KEY: ${{ secrets.ASC_API_KEY }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_API_KEY" | base64 -d \
            > ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8

          IPA_FILE=$(find "$RUNNER_TEMP/ipa" -name "*.ipa" | head -1)
          echo "Uploading: $IPA_FILE"
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_FILE" \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID" \
            --verbose

      - name: Cleanup secrets
        if: always()
        run: |
          security delete-keychain build.keychain || true
          rm -f /tmp/dist.p12 \
                ~/.appstoreconnect/private_keys/AuthKey_*.p8
